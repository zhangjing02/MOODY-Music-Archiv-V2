name: AI Issue Solver (Aider)

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  solve-issue:
    if: github.event.label.name == 'ai-fix'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Aider
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Run Aider to fix issue
        env:
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 配置 git 用户信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 动态选择模型逻辑
          # 默认使用 Flash (快/平)，如果标签包含 'pro' 则使用 Pro (强)
          SELECTED_MODEL="gemini/gemini-3.0-flash"
          if [[ "${{ github.event.label.name }}" == *"pro"* ]]; then
            SELECTED_MODEL="gemini/gemini-3.0-pro"
            echo "Elevating reasoning to Pro model..."
          fi
          
          # 构建结构化的修复指令
          PROMPT="你是一个专业的代码修复助手。请严格按照以下步骤处理这个 GitHub Issue：

          Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}
          详细描述: ${{ github.event.issue.body }}

          要求：
          1. 仔细阅读 Issue 描述，理解用户的真实需求
          2. 定位需要修改的具体文件和代码位置
          3. 执行必要的代码修改（不要只修改配置文件）
          4. 确认修改后的代码符合 Issue 要求
          5. 在完成后明确说明你修改了哪些文件的哪些内容

          如果你无法理解 Issue 或无法定位需要修改的代码，请明确说明原因。"
          
          # 运行 Aider 并捕获输出
          echo "开始执行 Aider 修复..."
          aider --model "$SELECTED_MODEL" --message "$PROMPT" --yes --verbose 2>&1 | tee aider_output.log
          
          echo "Aider 执行完成，输出已保存到 aider_output.log"

      - name: Verify meaningful changes
        id: verify
        run: |
          echo "检查是否有实际的代码修改..."
          
          # 获取所有修改的文件
          CHANGED_FILES=$(git diff --name-only HEAD)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "错误：未检测到任何文件修改"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # 过滤掉配置文件，检查是否有实际源代码修改
          MEANINGFUL_CHANGES=$(echo "$CHANGED_FILES" | grep -v -E '^\.(gitignore|aider)' || true)
          
          if [ -z "$MEANINGFUL_CHANGES" ]; then
            echo "错误：仅检测到配置文件修改，未发现源代码变更"
            echo "修改的文件: $CHANGED_FILES"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "✓ 检测到有效的代码修改:"
          echo "$MEANINGFUL_CHANGES"
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.verify.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AI: Fixed issue #${{ github.event.issue.number }} - ${{ github.event.issue.title }}"
          branch: "ai-fix-${{ github.event.issue.number }}"
          title: "AI: Auto-fix for issue #${{ github.event.issue.number }}"
          body: |
            This is an automated fix generated by Gemini via Aider.
            
            **Related Issue**: #${{ github.event.issue.number }}
            **Issue Title**: ${{ github.event.issue.title }}
            **Model Used**: ${{ contains(github.event.label.name, 'pro') && 'gemini-3.0-pro' || 'gemini-3.0-flash' }}
            
            **Modified Files**:
            ```
            $(git diff --name-only HEAD)
            ```
            
            **Verification**: ✓ Source code changes detected
            
            Please review the changes carefully and merge if correct.
          delete-branch: true

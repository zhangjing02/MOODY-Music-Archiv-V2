name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # 只有推送到 main 分支时触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image name
        id: prep
        run: |
          USERNAME=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=${USERNAME}/moodymusic" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.prep.outputs.IMAGE_NAME }}:latest
          # 缓存优化，加快以后构建速度
          cache-from: type=registry,ref=${{ steps.prep.outputs.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ steps.prep.outputs.IMAGE_NAME }}:buildcache,mode=max

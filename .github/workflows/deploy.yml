name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # 只有推送到 main 分支时触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/moodymusic:latest
          # 缓存优化，加快以后构建速度
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/moodymusic:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/moodymusic:buildcache,mode=max

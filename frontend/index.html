<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Archive - Project</title>
    <!-- 引入 Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;700&display=swap"
        rel="stylesheet">
    <!-- 引入 CSS -->
    <link rel="stylesheet" href="src/css/style.css?v=12.51">
    <link rel="stylesheet" href="src/css/user_system.css?v=12.51">
    <link rel="stylesheet" href="src/css/notion_compact.css?v=1.0">
</head>

<body>

    <div class="sidebar">
        <!-- 用户个人信息区域 -->
        <div class="user-profile" id="userProfile" onclick="showLoginModal()">
            <div class="user-avatar" id="userAvatar">
                <img src="src/assets/images/avatars/default.png" alt="Avatar">
            </div>
            <div class="user-info">
                <div class="user-name" id="userName">未登录</div>
                <div class="user-status" id="userStatus">点击登录系统</div>
            </div>
        </div>

        <div class="sb-brand">MOODY</div>
        <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24">
                <path
                    d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5.11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
            </svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Search...">
        </div>

        <div class="category-wrapper">
            <div class="category-scroll" id="categoryList"></div>
        </div>

        <div class="list-container" id="artistList"></div>
        <div class="index-bar" id="indexBar"></div>

        <!-- 本地上传按钮 -->
        <div class="upload-section">
            <input type="file" id="audioUpload" accept="audio/*" multiple style="display: none;">
            <button class="upload-btn" onclick="document.getElementById('audioUpload').click()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
                上传本地音乐
            </button>
            <div class="uploaded-count" id="uploadedCount"></div>
        </div>

        <!-- 设置按钮 已移除 -->
    </div>

    <div class="main-content">
        <!-- 移动端侧边栏触发器与遮罩层 -->
        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <div class="mobile-overlay" id="mobileOverlay"></div>

        <div class="content-scroll">
            <div class="album-header">
                <div class="ah-cover"><img id="vCover" src=""
                        style="display: none; opacity: 0; transition: opacity 0.3s ease;"></div>
                <div class="ah-info">
                    <div class="ai-type">专辑 / 年份</div>
                    <h1 class="ai-title" id="vTitle">Select Artist</h1>
                    <div class="ai-meta" id="vMeta">Waiting for database query...</div>
                    <!-- V12.0 云端对齐按钮 -->
                    <div class="ai-actions" style="margin-top: 10px;">
                        <button id="cloudSyncBtn" class="cloud-sync-btn" title="一键云端对齐碟报" style="display: none;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M17.5 19c.7-1 .5-2.5-.5-3.5a13.5 13.5 0 0 0-4.5-3.5l-2-1.5a13.5 13.5 0 0 0-4.5-3.5c-1-1-1.2-2.5-.5-3.5 1.4-2 5.4-2 7 0a6 6 0 0 1 1 2.5" />
                                <path d="M12 18V21M12 18l-3 3M12 18l3 3" />
                            </svg>
                            云端对齐名录
                        </button>
                    </div>
                </div>
                <div class="ah-lyrics" style="position: relative; height: 260px !important;">
                    <!-- 歌词调整触发器 (强制右下角，无背景) -->
                    <button id="lyricAdjBtn" class="lyric-adj-trigger" title="调整歌词偏移/内容"
                        style="display: none; position: absolute; bottom: 10px !important; right: 10px !important; top: auto !important; background: none !important; border: none !important; box-shadow: none !important; cursor: pointer;"
                        onmouseover="const s=this.querySelector('svg'); s.style.stroke='#d4af37'; s.style.opacity='1'; s.style.transform='scale(1.1)';"
                        onmouseout="const s=this.querySelector('svg'); s.style.stroke='#888'; s.style.opacity='0.4'; s.style.transform='scale(1)';">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round"
                            style="opacity: 0.4; transition: all 0.2s ease;">
                            <path d="M12 20h9"></path>
                            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                        </svg>
                    </button>
                    <div class="lyrics-container" style="height: 260px !important;">
                        <div class="lyrics-scroll" id="albumLyrics">
                            <!-- 初始状态保持空白 -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="nav-tabs" id="vTabs"></div>
            <table class="song-table">
                <tbody id="vSongs"></tbody>
            </table>
            <div style="height: 100px;"></div>

            <!-- 播放列表面板 (默认折叠) -->
            <div class="playlist-panel collapsed" id="playlistPanel" style="display: none;">
                <div class="playlist-header">
                    <h3>播放列表</h3>
                    <button class="playlist-toggle" id="playlistToggle">▼</button>
                </div>
                <div class="playlist-content" id="playlistContent">
                    <div class="playlist-empty">暂无播放中的歌曲</div>
                </div>
            </div>

            <!-- 歌词面板 (默认折叠) -->
            <div class="lyrics-panel collapsed" id="lyricsPanel" style="display: none;">
                <div class="lyrics-header">
                    <h3>歌词</h3>
                    <button class="lyrics-toggle" id="lyricsToggle">▼</button>
                </div>
                <div class="lyrics-content" id="lyricsContent">
                    <!-- 初始状态保持空白 -->
                </div>
            </div>
        </div>

        <div class="player-bar">
            <!-- 播放控制聚合区 (Prev - Vinyl - Next) -->
            <div class="transport-cluster">
                <!-- 上一首 -->
                <button class="transport-btn" id="prevBtn" title="Previous">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="19 20 9 12 19 4 19 20"></polygon>
                        <line x1="5" y1="19" x2="5" y2="5"></line>
                    </svg>
                </button>

                <div class="vinyl-container">
                    <!-- 旋转黑胶唱片 -->
                    <div class="vinyl-record" id="vinylRecord">
                        <div class="vinyl-disc">
                            <div class="vinyl-grooves"></div>
                            <!-- 专辑封面作为背景 -->
                            <div class="vinyl-cover" id="vinylCover"></div>
                            <div class="vinyl-label">
                                <img id="pThumb" src="" alt="Album Cover">
                            </div>
                            <div class="vinyl-spindle"></div>
                        </div>

                        <!-- 播放/暂停按钮 (悬浮在唱片中心) -->
                        <button class="vinyl-play-btn" id="playPauseBtn" title="Play/Pause">
                            <svg width="28" height="28" viewBox="0 0 36 36">
                                <path class="play-pause-path"
                                    d="M11,10 L18,13.74 L18,22.26 L11,26 Z M18,13.74 L26,18 L26,18 L18,22.26 Z"
                                    fill="#fff" />
                            </svg>
                        </button>
                    </div>

                    <!-- 唱臂位于唱片后方或独立定位 -->
                    <div class="tonearm" id="tonearm"></div>
                </div>

                <!-- 下一首 -->
                <button class="transport-btn" id="nextBtn" title="Next">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 4 15 12 5 20 5 4"></polygon>
                        <line x1="19" y1="5" x2="19" y2="19"></line>
                    </svg>
                </button>
            </div>

            <!-- 旧按钮移除了 -->

            <!-- 歌曲信息（可选显示，默认隐藏） -->
            <div class="pb-title-overlay" id="pTitleOverlay">No Track Playing</div>

            <div class="pb-info">
                <div class="pb-wrap">
                    <div class="pb-time" id="pTime">00:00 / 00:00</div>
                </div>
                <!-- 可拖动的进度条 -->
                <div class="pb-progress-container" id="progressContainer">
                    <div class="pb-progress-bg">
                        <div class="pb-progress-fill" id="pBar"></div>
                        <!-- 拖动手柄 -->
                        <div class="pb-progress-handle" id="progressHandle"></div>
                    </div>
                </div>
            </div>
            <div class="pb-ctrl-btns">
                <!-- 播放模式 -->
                <button class="pb-ctrl-btn mode-btn" id="modeBtn" title="播放模式">↺</button>
                <!-- 音量 -->
                <div class="volume-control">
                    <button class="pb-ctrl-btn volume-btn" id="volumeBtn" title="音量">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                            <path d="M15.54 8.46c.78-.78 2.05-.78 2.83 0" />
                            <path d="M19.07 5c1.56-1.56 4.09-1.56 5.66 0" />
                        </svg>
                    </button>
                    <div class="volume-slider" id="volumeSlider">
                        <div class="volume-fill" id="volumeFill" style="width: 70%"></div>
                    </div>
                </div>
                <!-- 收藏 -->
                <button class="pb-ctrl-btn favorite-btn" id="favoriteBtn" title="收藏">
                    <span class="heart-icon">♡</span>
                    <div class="star-animation-container" id="starContainer"></div>
                </button>
            </div>
        </div>

        <!-- 隐藏的音频播放器 -->
        <audio id="audioPlayer" preload="auto"></audio>
    </div>

    <!-- 注意：加载顺序很重要，先加载数据，再加载逻辑 -->
    <script src="src/js/lyrics.js?v=12.51"></script>
    <script src="src/js/lazy-loader.js?v=12.51"></script>
    <script src="src/js/storage.js?v=12.51"></script>
    <script src="src/js/user_system.js?v=12.51"></script>
    <script src="src/js/app.js?v=12.51"></script>
    <script src="src/js/player.js?v=12.51"></script>
    <!-- 引入雪花特效 (最后加载) -->
    <script src="src/js/snow.js"></script>
    <script>
        // 统一初始化 - 等待 app 加载完成后再初始化播放器
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('开始初始化应用...');

            // 等待 initApp 完成（包括从 IndexedDB 加载音乐）
            if (typeof initApp === 'function') {
                await initApp();
                console.log('app.js 初始化完成');
            }

            // 再初始化播放器（也是异步的）
            if (typeof initPlayer === 'function') {
                await initPlayer();
                console.log('player.js 初始化完成');
            }

            console.log('应用初始化完成');
        });
    </script>
    <!-- 登录弹窗 -->
    <div class="modal-overlay" id="loginModal">
        <div class="login-modal">
            <div class="modal-header">
                <h2>用户登录 / 注册</h2>
                <button class="close-modal" onclick="hideLoginModal()">&times;</button>
            </div>
            <div class="login-form">
                <p class="login-hint">新用户将自动完成注册 (Level 2)</p>
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" required>
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="随便写点什么..." required>
                </div>
                <button class="login-submit-btn" id="loginSubmitBtn">进入 MOODY 存档</button>
                <div id="loginMessage" class="login-message"></div>
            </div>
        </div>
    </div>



    <!-- 歌词调整弹窗 -->
    <div class="modal-overlay" id="lyricModal">
        <div class="lyric-modal">
            <div class="lyric-modal-header">
                <h2>歌词内容与偏移调整</h2>
                <button class="close-modal" id="closeLyricModal">&times;</button>
            </div>
            <div class="lyric-editor-container">
                <div class="editor-main-area" style="display: flex; flex: 1; gap: 15px; min-height: 0;">
                    <textarea id="lyricRawText" spellcheck="false" placeholder="正在加载歌词原始内容..."></textarea>
                    <!-- 新增：实时歌词预览面板 -->
                    <div class="lyric-preview-panel" id="lyricPreviewPanel">
                        <div class="preview-placeholder">打开编辑器后歌词将在此实时预览</div>
                    </div>
                </div>

                <div class="lyric-tools">
                    <div class="tool-group">
                        <span class="tool-label">元数据助手:</span>
                        <button class="shift-btn tool-mini-btn" id="btnInsertTitle" title="插入标题标签">标题</button>
                        <button class="shift-btn tool-mini-btn" id="btnInsertArtist" title="插入艺术家标签">歌手</button>
                        <button class="shift-btn tool-mini-btn" id="btnInsertAlbum" title="插入专辑标签">专辑</button>
                        <button class="shift-btn tool-mini-btn" id="btnInsertOffset" title="插入全局偏移标签">偏移</button>
                    </div>
                    <div class="tool-group">
                        <span class="tool-label">时间平移:</span>
                        <input type="number" id="shiftAmount" class="shift-input" value="30" step="0.5">
                        <button class="shift-btn" id="btnShiftForward">向前</button>
                        <button class="shift-btn" id="btnShiftBackward">向后</button>
                    </div>
                    <div class="tool-group">
                        <span class="tool-label">编辑辅助:</span>
                        <button class="shift-btn" id="btnAutoFormat" title="为纯文本歌词补充时间戳模板">自动格式化</button>
                        <button class="shift-btn" id="btnManualTag" title="快捷键: Alt + T">快捷打点</button>
                        <button class="shift-btn tap-sync-btn" id="btnTapSync" title="进入逐句打点模式：听歌+按空格/点击逐行标记时间">⏱
                            逐句打点</button>
                        <button class="shift-btn" id="btnUndoTap" title="撤销上次打点" style="display: none;">↩ 撤销</button>
                    </div>
                    <div class="tool-group" style="margin-left: auto;">
                        <span class="tool-label">预览控制:</span>
                        <button class="shift-btn" id="modalPlayPause">播放/暂停</button>
                        <span id="modalCurrentTime"
                            style="font-family: monospace; color: var(--accent); font-size: 0.85rem; min-width: 45px; text-align: center;">00:00</span>
                    </div>
                </div>
            </div>
            <div class="lyric-modal-footer">
                <button class="lyric-cancel-btn" id="cancelLyricUpdate">取消</button>
                <button class="lyric-save-btn" id="saveLyricUpdate">保存修改并重新同步</button>
            </div>
        </div>
    </div>
</body>

</html>
